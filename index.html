<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>かずあそびボード - たしざんのがくしゅう</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for Cute Japanese typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    /* 木枠のテクスチャをCSSグラデーションで表現 */
    .wood-frame {
      background: linear-gradient(135deg, #d7a15c 0%, #c58b43 50%, #b0752d 100%);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.4), 0 10px 25px rgba(0,0,0,0.3);
    }
    .wood-board {
      background: #fdf5e6; /* 温かみのあるアイボリー */
      background-image: radial-gradient(rgba(180, 140, 90, 0.05) 1px, transparent 0),
                        radial-gradient(rgba(180, 140, 90, 0.05) 1px, transparent 0);
      background-size: 8px 8px;
      background-position: 0 0, 4px 4px;
    }
    /* 手書き風数字ボックス */
    .num-box-yellow {
      border: 4px solid #eab308;
      background-color: #fef08a;
    }
    .num-box-blue {
      border: 4px solid #3b82f6;
      background-color: #bfdbfe;
    }
    .num-box-green {
      border: 4px solid #22c55e;
      background-color: #bbf7d0;
    }
    .num-box-purple {
      border: 4px dashed #a855f7;
      background-color: #f3e8ff;
    }
    
    /* アニメーション */
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .bounce-slow {
      animation: bounce-slow 2s infinite ease-in-out;
    }
    
    /* 煙や雲のゆらゆら */
    @keyframes float-cloud {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(10px); }
    }
    .float-cloud {
      animation: float-cloud 6s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col items-center justify-between p-2 md:p-4 overflow-x-hidden">

  <!-- メインヘッダー -->
  <header class="w-full max-w-md text-center py-1 flex justify-between items-center px-2">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🎈</span>
      <h1 class="text-xl md:text-2xl font-black text-amber-800 tracking-wider">かずあそびボード</h1>
    </div>
    <button id="resetBtn" class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-3 py-1.5 rounded-full text-sm shadow-md transition-all active:scale-95 flex items-center gap-1">
      <span>🔄</span><span>さいしょから</span>
    </button>
  </header>

  <!-- ゲームメッセージ -->
  <div class="w-full max-w-md bg-white/90 border-2 border-amber-200 rounded-2xl p-2.5 shadow-sm text-center mb-1 relative">
    <p id="guideText" class="text-base md:text-lg font-bold text-amber-900 leading-tight">
      スタートボタンを おしてね！👇
    </p>
    <div id="handGuide" class="absolute right-4 -bottom-3 text-2xl pointer-events-none hidden transition-all duration-500">
      👆
    </div>
  </div>

  <!-- ゲームメインエリア：高さが0に潰れないよう最小高さを確実にCSSで指定 -->
  <div class="w-full max-w-md aspect-[3/4] min-h-[420px] relative flex-grow flex items-center justify-center py-2">
    <!-- 外側の木枠 -->
    <div class="wood-frame w-full h-full rounded-3xl p-3 md:p-4 flex flex-col relative overflow-hidden">
      <!-- 内側のボード板 -->
      <div class="wood-board w-full h-full rounded-2xl relative overflow-hidden flex flex-col border border-amber-900/10">
        
        <!-- 背景の空、気球、雲の描画(CSS) -->
        <div class="absolute inset-0 opacity-15 pointer-events-none overflow-hidden">
          <!-- 雲1 -->
          <div class="absolute top-10 left-10 float-cloud text-4xl">☁️</div>
          <!-- 雲2 -->
          <div class="absolute top-24 right-12 float-cloud text-5xl" style="animation-delay: 2s;">☁️</div>
          <!-- 気球 -->
          <div class="absolute top-4 right-1/4 bounce-slow text-4xl" style="animation-delay: 1s;">🎈</div>
          <div class="absolute top-16 left-1/4 bounce-slow text-3xl">🎈</div>
          <!-- ゾウとトラ -->
          <div class="absolute bottom-40 left-4 text-3xl opacity-30">🐯</div>
          <div class="absolute bottom-40 right-4 text-3xl opacity-30">🐘</div>
        </div>

        <!-- 物理アニメーション用キャンバス -->
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full z-10"></canvas>

        <!-- UI要素レイヤー (Canvasの上に重ねる) -->
        <div class="absolute inset-0 z-20 pointer-events-none flex flex-col justify-between p-2">
          
          <!-- 上部：ビー玉投入セレクトエリア -->
          <div id="startScreen" class="pointer-events-auto absolute inset-0 bg-amber-900/40 backdrop-blur-[2px] rounded-2xl flex flex-col items-center justify-center p-4 z-30 transition-all duration-500">
            <div class="bg-white/95 rounded-2xl p-6 shadow-2xl border-4 border-amber-400 text-center max-w-[90%] transform scale-100 transition-transform">
              <p class="text-xl md:text-2xl font-black text-amber-900 mb-4">🔮 ビー玉を おとそう！</p>
              
              <button onclick="startRandomMarbles()" class="bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white font-black text-2xl px-12 py-4 rounded-2xl shadow-lg hover:shadow-xl active:scale-95 transition-all animate-bounce">
                スタート！ 🔮
              </button>
              
              <p class="text-xs text-amber-700 font-semibold mt-4">1〜10この ビー玉が ランダムに おちてくるよ！</p>
            </div>
          </div>

          <!-- 中央：数式ボード（家型のボード部分を再現） -->
          <div id="equationBoard" class="absolute left-1/2 -translate-x-1/2 top-[42%] -translate-y-1/2 w-[45%] aspect-[5/6] bg-[#fbf5eb] rounded-xl border-4 border-amber-700/80 shadow-md flex flex-col justify-between p-2 pointer-events-auto z-20">
            <!-- 家の屋根の装飾（CSSで表現） -->
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[45px] border-r-[45px] border-b-[16px] border-l-transparent border-r-transparent border-b-amber-800"></div>
            
            <!-- 上部：合計カード -->
            <div class="flex justify-center mt-2">
              <div id="boxTotal" onclick="openKeypad('total')" class="w-12 h-12 md:w-14 md:h-14 num-box-purple rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black text-purple-700 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valTotal">?</span>
                <div id="glowTotal" class="absolute inset-0 border-4 border-purple-500 rounded-xl opacity-0"></div>
              </div>
            </div>

            <!-- 分岐の線 (SVG) -->
            <div class="w-full flex justify-center -my-1 h-8">
              <svg class="w-full h-full" viewBox="0 0 100 40">
                <line x1="50" y1="5" x2="25" y2="35" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                <line x1="50" y1="5" x2="75" y2="35" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>

            <!-- 下部：左右のカード -->
            <div class="flex justify-between px-1 mb-2">
              <!-- 左 -->
              <div id="boxLeft" onclick="openKeypad('left')" class="w-11 h-11 md:w-12 md:h-12 num-box-yellow rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-amber-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valLeft">?</span>
                <div id="glowLeft" class="absolute inset-0 border-4 border-yellow-500 rounded-xl opacity-0"></div>
              </div>
              
              <!-- プラス記号 -->
              <div class="flex items-center justify-center font-bold text-amber-800 text-lg md:text-xl">+</div>

              <!-- 右 -->
              <div id="boxRight" onclick="openKeypad('right')" class="w-11 h-11 md:w-12 md:h-12 num-box-blue rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-blue-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valRight">?</span>
                <div id="glowRight" class="absolute inset-0 border-4 border-blue-500 rounded-xl opacity-0"></div>
              </div>
            </div>
          </div>

          <!-- 仕切り板（ピンクのバー）のクリック・タップ検出領域 -->
          <div id="pinkStopper" class="pointer-events-auto absolute bottom-[14.5%] left-0 w-full h-[3.5%] cursor-pointer z-20 flex justify-center items-center">
            <!-- 仕切り引き抜きのガイド手アイコン -->
            <div id="stopperTouchGuide" class="hidden absolute right-[10%] -top-12 bg-rose-100 border-2 border-rose-400 text-rose-800 font-black rounded-lg px-2 py-1 text-xs shadow-md animate-bounce">
              ここを タップ！ 👇
            </div>
            <!-- ピンクのバー本体 -->
            <div class="w-full h-full bg-pink-500/20 active:bg-pink-500/40 transition-colors"></div>
          </div>

        </div>

        <!-- 祝・クリア！の特大オーバーレイ -->
        <div id="clearOverlay" class="absolute inset-0 z-40 bg-amber-900/60 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-700">
          <div class="bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-75 transition-transform duration-700" id="clearModal">
            <span class="text-6xl md:text-7xl block animate-bounce mb-3">🎉 💮 🎉</span>
            <h2 class="text-2xl md:text-3xl font-black text-green-600 mb-1">できた！すごーい！</h2>
            <p id="mathSummaryText" class="text-xl md:text-2xl font-bold text-amber-800 mb-4 bg-amber-50 py-2 rounded-xl">4 + 3 = 7</p>
            <button onclick="resetGame()" class="bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-black text-lg md:text-xl px-8 py-3 rounded-full shadow-lg hover:shadow-xl active:scale-95 transition-all">
              もういちど あそぶ！ 🔄
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- タブレット/スマホ用の数字キーパッド -->
  <div id="keypad" class="w-full max-w-md bg-amber-100 border-t-4 border-amber-300 p-3 rounded-t-3xl shadow-2xl transition-all duration-300 translate-y-full fixed bottom-0 left-1/2 -translate-x-1/2 z-50">
    <div class="flex justify-between items-center mb-2 px-1">
      <span id="keypadTitle" class="font-bold text-amber-900 text-base">すうじを えらぼう</span>
      <button onclick="closeKeypad()" class="text-amber-800 hover:text-amber-950 font-black text-sm bg-amber-200 hover:bg-amber-300 px-3 py-1 rounded-full">
        とじる ✖
      </button>
    </div>
    <!-- 0から10までの丸いテンキー -->
    <div class="grid grid-cols-6 gap-1.5 justify-items-center">
      <button onclick="pressKey(0)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">0</button>
      <button onclick="pressKey(1)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">1</button>
      <button onclick="pressKey(2)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">2</button>
      <button onclick="pressKey(3)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">3</button>
      <button onclick="pressKey(4)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">4</button>
      <button onclick="pressKey(5)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">5</button>
      <button onclick="pressKey(6)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">6</button>
      <button onclick="pressKey(7)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">7</button>
      <button onclick="pressKey(8)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">8</button>
      <button onclick="pressKey(9)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">9</button>
      <button onclick="pressKey(10)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all col-span-2 w-full !rounded-xl">10</button>
    </div>
  </div>

  <!-- フッター -->
  <footer class="w-full max-w-md text-center py-2 text-xs text-amber-700/80 font-semibold">
    木のおもちゃを スマホやタブレットで再現しました
  </footer>

  <!-- 2D 物理演算 & ゲーム進行 JS -->
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 画面アスペクト比固定 (3:4)
    function resizeCanvas() {
      const parent = canvas.parentElement;
      canvas.width = parent.clientWidth;
      canvas.height = parent.clientHeight;
      initBoardLayout(); 
    }

    // --- パーティクルエフェクト ---
    let particles = [];
    function createParticle(x, y, color, type = 'star') {
      const pCount = type === 'smoke' ? 3 : 10;
      for (let i = 0; i < pCount; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * (type === 'smoke' ? 2 : 6),
          vy: (Math.random() - 0.5) * (type === 'smoke' ? 2 : 6) - (type === 'smoke' ? 1 : 2),
          r: Math.random() * (type === 'smoke' ? 8 : 4) + 2,
          color: color,
          alpha: 1,
          decay: Math.random() * 0.02 + 0.015,
          type: type,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.1
        });
      }
    }

    // --- ゲームのステート管理 ---
    const STATE = {
      SELECT: 'select',            // 球数選択
      DROP: 'drop',                // 上から落下
      INPUT_HALVES: 'input_halves',// 左右の数字入力待ち
      READY_RELEASE: 'ready_release', // ピンク仕切りタップ待ち
      RELEASING: 'releasing',      // 落ちていく
      INPUT_TOTAL: 'input_total',  // 合計入力待ち
      COMPLETE: 'complete'         // お祝い
    };

    let currentState = STATE.SELECT;
    let targetTotalMarbles = 0; // ユーザーが指定した球数
    let marbles = [];
    let pins = [];
    let activeKeypadTarget = null; // 'left', 'right', 'total'

    // 入力値
    let inputLeft = null;
    let inputRight = null;
    let inputTotal = null;

    // おもちゃのレイアウト設定
    let leftCount = 0;
    let rightCount = 0;

    // 仕切り板（ピンクのバー）の状態
    let stopper = {
      x: 0,
      y: 0,
      width: 0,
      height: 10,
      targetX: 0,
      currentX: 0,
      isOpen: false
    };

    // ピンの配置の初期化
    function initBoardLayout() {
      pins = [];
      const w = canvas.width;
      const h = canvas.height;

      // ピンは屋根の上部に配置
      const rows = 4;
      const startY = h * 0.08;
      const endY = h * 0.26;
      const stepY = (endY - startY) / (rows - 1);

      for (let r = 0; r < rows; r++) {
        const pinY = startY + r * stepY;
        const cols = r % 2 === 0 ? 6 : 7;
        const stepX = w / (cols + 1);
        for (let c = 0; c < cols; c++) {
          const pinX = stepX * (c + 1);
          if (r === 0 && (c === 2 || c === 3)) continue;
          pins.push({ x: pinX, y: pinY, r: 6 });
        }
      }

      // 左右の部屋の物理仕切り
      stopper.width = w;
      stopper.y = h * 0.85; 
      stopper.height = h * 0.02;
      stopper.currentX = 0;
      stopper.targetX = 0;
      stopper.isOpen = false;
    }

    // ビー玉クラス
    class Marble {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = 0;
        this.r = canvas.height * 0.047 * 0.45; 
        this.color = '#e2e8f0'; 
        this.bounce = 0.45; 
        this.status = 'falling'; 
        this.alignedIndex = -1;
        this.hue = Math.random() * 360; 
      }

      update() {
        const w = canvas.width;
        const h = canvas.height;
        const gravity = 0.25;

        if (this.status === 'falling') {
          this.vy += gravity;
          this.x += this.vx;
          this.y += this.vy;

          if (this.x - this.r < w * 0.04) {
            this.x = w * 0.04 + this.r;
            this.vx = -this.vx * this.bounce;
          }
          if (this.x + this.r > w * 0.96) {
            this.x = w * 0.96 - this.r;
            this.vx = -this.vx * this.bounce;
          }

          pins.forEach(pin => {
            const dx = this.x - pin.x;
            const dy = this.y - pin.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.r + pin.r) {
              const angle = Math.atan2(dy, dx);
              this.x = pin.x + (this.r + pin.r) * Math.cos(angle);
              this.y = pin.y + (this.r + pin.r) * Math.sin(angle);

              const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
              this.vx = Math.cos(angle) * speed * this.bounce + (Math.random() - 0.5) * 0.5;
              this.vy = Math.sin(angle) * speed * this.bounce;
            }
          });

          const roofPeakX = w * 0.5;
          const roofPeakY = h * 0.31;
          const roofLeftEndX = w * 0.28;
          const roofLeftEndY = h * 0.37;
          const roofRightEndX = w * 0.72;
          const roofRightEndY = h * 0.37;

          if (this.x >= roofLeftEndX && this.x <= roofPeakX) {
            const ratio = (this.x - roofLeftEndX) / (roofPeakX - roofLeftEndX);
            const lineY = roofLeftEndY + ratio * (roofPeakY - roofLeftEndY);
            if (this.y + this.r >= lineY) {
              this.status = 'slide_left';
              this.vx = -2.5; 
              this.vy = 1;
            }
          }
          else if (this.x > roofPeakX && this.x <= roofRightEndX) {
            const ratio = (this.x - roofPeakX) / (roofRightEndX - roofPeakX);
            const lineY = roofPeakY + ratio * (roofRightEndY - roofPeakY);
            if (this.y + this.r >= lineY) {
              this.status = 'slide_right';
              this.vx = 2.5; 
              this.vy = 1;
            }
          }

          if (this.y > h * 0.37) {
            if (this.x < w * 0.28) {
              this.status = 'stack_left';
            } else if (this.x > w * 0.72) {
              this.status = 'stack_right';
            } else {
              if (this.x < w * 0.5) {
                this.x = w * 0.25;
                this.status = 'stack_left';
              } else {
                this.x = w * 0.75;
                this.status = 'stack_right';
              }
            }
          }
        }

        else if (this.status === 'slide_left') {
          this.x += this.vx;
          this.y += 0.8;
          if (this.x < w * 0.26) {
            this.status = 'stack_left';
          }
        }

        else if (this.status === 'slide_right') {
          this.x += this.vx;
          this.y += 0.8;
          if (this.x > w * 0.74) {
            this.status = 'stack_right';
          }
        }

        else if (this.status === 'stack_left') {
          const slotX = w * 0.22; 
          const index = marbles.filter(m => m.status === 'stack_left' && m.y > this.y).length;
          
          let targetY;
          if (stopper.isOpen) {
            targetY = h * 1.1; 
          } else {
            const sideHeight = h * 0.47;
            const startY = h * 0.38;
            const stepY = sideHeight / 10;
            targetY = startY + (9.5 - index) * stepY;
          }

          this.x += (slotX - this.x) * 0.2;
          if (this.y < targetY) {
            this.vy += gravity;
            this.y += this.vy;
          } else {
            this.y += (targetY - this.y) * 0.3;
            this.vy = 0;
            this.vx = 0;
          }

          if (stopper.isOpen) {
            this.status = 'dropping_bottom';
          }
        }

        else if (this.status === 'stack_right') {
          const slotX = w * 0.78; 
          const index = marbles.filter(m => m.status === 'stack_right' && m.y > this.y).length;
          
          let targetY;
          if (stopper.isOpen) {
            targetY = h * 1.1; 
          } else {
            const sideHeight = h * 0.47;
            const startY = h * 0.38;
            const stepY = sideHeight / 10;
            targetY = startY + (9.5 - index) * stepY;
          }

          this.x += (slotX - this.x) * 0.2;
          if (this.y < targetY) {
            this.vy += gravity;
            this.y += this.vy;
          } else {
            this.y += (targetY - this.y) * 0.3;
            this.vy = 0;
            this.vx = 0;
          }

          if (stopper.isOpen) {
            this.status = 'dropping_bottom';
          }
        }

        else if (this.status === 'dropping_bottom') {
          this.vy += gravity;
          this.y += this.vy;
          this.x += this.vx;

          const bottomY = h * 0.94;
          if (this.y >= bottomY - this.r) {
            this.y = bottomY - this.r;
            this.vy = 0;
            this.status = 'aligned_bottom';
            const alignedCount = marbles.filter(m => m.status === 'aligned_bottom').length - 1;
            this.alignedIndex = alignedCount;
            createParticle(this.x, this.y, '#3b82f6', 'smoke');
          }
        }

        else if (this.status === 'aligned_bottom') {
          const trayStartX = w * 0.14;
          const trayEndX = w * 0.86;
          const trayWidth = trayEndX - trayStartX;
          const slotWidth = trayWidth / 10;

          if (this.alignedIndex !== -1) {
            const targetX = trayStartX + (this.alignedIndex * slotWidth) + (slotWidth / 2);
            this.x += (targetX - this.x) * 0.12;
            this.y = h * 0.93 - this.r; 
          }
        }
      }

      draw() {
        ctx.save();
        const grad = ctx.createRadialGradient(
          this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
          this.x, this.y, this.r
        );

        const hue = this.hue;
        grad.addColorStop(0, '#ffffff'); 
        grad.addColorStop(0.2, `hsl(${hue}, 85%, 75%)`);
        grad.addColorStop(0.8, `hsl(${hue}, 80%, 45%)`);
        grad.addColorStop(1, `hsl(${hue}, 90%, 25%)`);

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 3;
        
        ctx.fill();
        ctx.restore();
      }
    }

    // ゲームリセット
    function resetGame() {
      marbles = [];
      particles = [];
      inputLeft = null;
      inputRight = null;
      inputTotal = null;

      document.getElementById('valLeft').textContent = '?';
      document.getElementById('valRight').textContent = '?';
      document.getElementById('valTotal').textContent = '?';

      document.getElementById('boxLeft').className = 'w-11 h-11 md:w-12 md:h-12 num-box-yellow rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-amber-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';
      document.getElementById('boxRight').className = 'w-11 h-11 md:w-12 md:h-12 num-box-blue rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-blue-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';
      document.getElementById('boxTotal').className = 'w-12 h-12 md:w-14 md:h-14 num-box-purple rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black text-purple-700 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';

      // ポップアップ消去
      document.getElementById('clearOverlay').className = "absolute inset-0 z-40 bg-amber-900/60 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-700";
      document.getElementById('clearModal').className = "bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-75 transition-transform duration-700";

      // スタート画面の復活
      const startScreen = document.getElementById('startScreen');
      startScreen.style.display = 'flex';
      setTimeout(() => {
        startScreen.classList.remove('opacity-0', 'pointer-events-none');
        startScreen.classList.add('pointer-events-auto');
      }, 50);
      
      initBoardLayout();
      currentState = STATE.SELECT;
      updateGuideMessage();
    }
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    // 1〜10個のビー玉をランダムに決定して開始する処理
    function startRandomMarbles() {
      const randomCount = Math.floor(Math.random() * 10) + 1;
      selectMarbleCount(randomCount);
    }

    // ビー玉投入選択
    function selectMarbleCount(count) {
      targetTotalMarbles = count;
      currentState = STATE.DROP;
      
      // スタート画面をフェードアウトさせて物理的にも完全に非表示にする
      const startScreen = document.getElementById('startScreen');
      startScreen.classList.remove('pointer-events-auto');
      startScreen.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        if (currentState !== STATE.SELECT) {
          startScreen.style.display = 'none';
        }
      }, 500);

      updateGuideMessage();

      // ビー玉を投入
      let dropped = 0;
      const interval = setInterval(() => {
        if (dropped >= targetTotalMarbles) {
          clearInterval(interval);
          return;
        }
        const dropX = canvas.width * 0.5 + (Math.random() - 0.5) * 15;
        const dropY = -20;
        marbles.push(new Marble(dropX, dropY));
        dropped++;
      }, 500);
    }

    // ガイドメッセージの更新
    function updateGuideMessage() {
      const guide = document.getElementById('guideText');
      const hand = document.getElementById('handGuide');

      hand.classList.add('hidden');

      if (currentState === STATE.SELECT) {
        guide.innerHTML = "🔮 スタートボタンを おしてね！👇";
      } else if (currentState === STATE.DROP) {
        guide.innerHTML = "🍭 コロコロ... どっちに おちるかな？";
      } else if (currentState === STATE.INPUT_HALVES) {
        guide.innerHTML = "✏️ 左右の部屋の ビー玉は なんこ？<br><span class='text-amber-600 font-bold'>きいろ</span> と <span class='text-blue-600 font-bold'>みずいろ</span> の しかくを タップして すうじを いれてね！";
        hand.classList.remove('hidden');
        hand.style.left = "42%";
        hand.style.top = "60%";
      } else if (currentState === STATE.READY_RELEASE) {
        guide.innerHTML = "🔔 ピンクの しきり板 を タップして はずしてみよう！";
        document.getElementById('stopperTouchGuide').classList.remove('hidden');
      } else if (currentState === STATE.RELEASING) {
        guide.innerHTML = "🌈 ザザーッ！ ビー玉が 下に ならぶよ！";
        document.getElementById('stopperTouchGuide').classList.add('hidden');
      } else if (currentState === STATE.INPUT_TOTAL) {
        guide.innerHTML = "✏️ ぜんぶで なんこ になったかな？<br>いちばん <span class='text-purple-600 font-bold'>うえの むらさきの しかく（？マーク）</span> を タップして ね！";
        hand.classList.remove('hidden');
        hand.style.left = "50%";
        hand.style.top = "38%";
      } else if (currentState === STATE.COMPLETE) {
        guide.innerHTML = "🎉 おめでとう！ かんぺきだね！ ✨";
      }
    }

    // --- テンキー（キーパッド）操作 ---
    function openKeypad(target) {
      if (currentState === STATE.INPUT_HALVES && (target === 'left' || target === 'right')) {
        activeKeypadTarget = target;
        document.getElementById('keypadTitle').innerHTML = target === 'left' ? "🍋 ひだりの部屋 の ビー玉の数" : "🐳 みぎの部屋 の ビー玉の数";
        document.getElementById('keypad').classList.remove('translate-y-full');
        
        document.getElementById('glowLeft').classList.toggle('opacity-100', target === 'left');
        document.getElementById('glowRight').classList.toggle('opacity-100', target === 'right');
      } 
      else if (currentState === STATE.INPUT_TOTAL && target === 'total') {
        activeKeypadTarget = target;
        document.getElementById('keypadTitle').innerHTML = "🌟 ぜんぶ合わせた ビー玉の数";
        document.getElementById('keypad').classList.remove('translate-y-full');
        document.getElementById('glowTotal').classList.add('opacity-100');
      }
    }

    function closeKeypad() {
      document.getElementById('keypad').classList.add('translate-y-full');
      document.getElementById('glowLeft').classList.remove('opacity-100');
      document.getElementById('glowRight').classList.remove('opacity-100');
      document.getElementById('glowTotal').classList.remove('opacity-100');
      activeKeypadTarget = null;
    }

    function pressKey(num) {
      if (!activeKeypadTarget) return;

      if (activeKeypadTarget === 'left') {
        inputLeft = num;
        document.getElementById('valLeft').textContent = num;
        checkHalves();
      } else if (activeKeypadTarget === 'right') {
        inputRight = num;
        document.getElementById('valRight').textContent = num;
        checkHalves();
      } else if (activeKeypadTarget === 'total') {
        inputTotal = num;
        document.getElementById('valTotal').textContent = num;
        checkTotal();
      }

      closeKeypad();
    }

    // 左右の入力が合っているかチェック
    function checkHalves() {
      const isLeftCorrect = inputLeft === leftCount;
      const isRightCorrect = inputRight === rightCount;

      if (inputLeft !== null) {
        document.getElementById('boxLeft').className = isLeftCorrect 
          ? 'w-11 h-11 md:w-12 md:h-12 num-box-green rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-green-700 shadow-inner pointer-events-auto z-30'
          : 'w-11 h-11 md:w-12 md:h-12 num-box-yellow rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-rose-600 shadow-inner border-rose-500 bg-rose-50 pointer-events-auto z-30';
      }
      if (inputRight !== null) {
        document.getElementById('boxRight').className = isRightCorrect 
          ? 'w-11 h-11 md:w-12 md:h-12 num-box-green rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-green-700 shadow-inner pointer-events-auto z-30'
          : 'w-11 h-11 md:w-12 md:h-12 num-box-blue rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-rose-600 shadow-inner border-rose-500 bg-rose-50 pointer-events-auto z-30';
      }

      if (isLeftCorrect && isRightCorrect) {
        currentState = STATE.READY_RELEASE;
        updateGuideMessage();
        createParticle(canvas.width * 0.25, canvas.height * 0.5, '#22c55e', 'star');
        createParticle(canvas.width * 0.75, canvas.height * 0.5, '#22c55e', 'star');
      }
    }

    // 合計の入力チェック
    function checkTotal() {
      const expectedTotal = leftCount + rightCount;
      const isCorrect = inputTotal === expectedTotal;

      if (isCorrect) {
        document.getElementById('boxTotal').className = 'w-12 h-12 md:w-14 md:h-14 num-box-green rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black text-green-700 shadow-inner pointer-events-auto z-30';
        currentState = STATE.COMPLETE;
        updateGuideMessage();
        
        document.getElementById('mathSummaryText').innerHTML = `${leftCount} + ${rightCount} = <span class="text-green-600 text-3xl font-black ml-1">${expectedTotal}</span>`;
        
        setTimeout(() => {
          document.getElementById('clearOverlay').className = "absolute inset-0 z-40 bg-amber-900/60 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center p-4 opacity-100 transition-all duration-700 pointer-events-auto";
          document.getElementById('clearModal').className = "bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-100 transition-transform duration-700";
          
          for (let i = 0; i < 50; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: -20,
              vx: (Math.random() - 0.5) * 8,
              vy: Math.random() * 5 + 2,
              r: Math.random() * 6 + 4,
              color: `hsl(${Math.random() * 360}, 90%, 60%)`,
              alpha: 1,
              decay: 0.005,
              type: 'confetti',
              angle: Math.random() * Math.PI,
              spin: (Math.random() - 0.5) * 0.2
            });
          }
        }, 1000);
      } else {
        document.getElementById('boxTotal').className = 'w-12 h-12 md:w-14 md:h-14 num-box-purple rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black text-rose-600 shadow-inner border-rose-500 bg-rose-50 pointer-events-auto z-30';
      }
    }

    // 仕切り板タップ処理
    document.getElementById('pinkStopper').addEventListener('click', () => {
      if (currentState === STATE.READY_RELEASE) {
        stopper.isOpen = true;
        currentState = STATE.RELEASING;
        updateGuideMessage();
        createParticle(canvas.width * 0.5, stopper.y, '#ec4899', 'smoke');
        
        // ビー玉の落下判定漏れを防ぐセーフティタイマー（1.5秒後に強制的に整列して合計入力モードへ移行）
        setTimeout(() => {
          if (currentState === STATE.RELEASING) {
            marbles.forEach((marble, idx) => {
              marble.status = 'aligned_bottom';
              marble.alignedIndex = idx;
            });
            currentState = STATE.INPUT_TOTAL;
            updateGuideMessage();
          }
        }, 1500);
      }
    });

    // --- メインループ ---
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width;
      const h = canvas.height;

      // 【修正】自己修復：もし画面のレイアウトサイズが突然確定し、Canvasのサイズが不一致になった場合は自動修正する
      const parent = canvas.parentElement;
      if (parent && (canvas.width !== parent.clientWidth || canvas.height !== parent.clientHeight)) {
        if (parent.clientWidth > 10 && parent.clientHeight > 10) {
          canvas.width = parent.clientWidth;
          canvas.height = parent.clientHeight;
          initBoardLayout();
        }
      }

      drawBoardBackground(w, h);

      let allMarblesSettled = true;
      let tempLeftCount = 0;
      let tempRightCount = 0;

      marbles.forEach(marble => {
        marble.update();
        marble.draw();

        if (marble.status === 'falling' || marble.status === 'slide_left' || marble.status === 'slide_right') {
          allMarblesSettled = false;
        }
        if (marble.status === 'stack_left') {
          tempLeftCount++;
        }
        if (marble.status === 'stack_right') {
          tempRightCount++;
        }
        if (marble.status === 'dropping_bottom') {
          allMarblesSettled = false;
        }
      });

      if (currentState === STATE.DROP && allMarblesSettled && marbles.length === targetTotalMarbles) {
        leftCount = tempLeftCount;
        rightCount = tempRightCount;
        currentState = STATE.INPUT_HALVES;
        updateGuideMessage();
      }

      if (currentState === STATE.RELEASING) {
        const bottomCount = marbles.filter(m => m.status === 'aligned_bottom').length;
        if (bottomCount === targetTotalMarbles) {
          currentState = STATE.INPUT_TOTAL;
          updateGuideMessage();
        }
      }

      drawStopper(w, h);
      drawParticles();

      requestAnimationFrame(animate);
    }

    function drawBoardBackground(w, h) {
      const sideWidth = w * 0.125;
      const sideHeight = h * 0.47;
      const startY = h * 0.38;

      const colors = [
        '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', 
        '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899'
      ];

      for (let i = 0; i < 10; i++) {
        const stepY = sideHeight / 10;
        const blockY = startY + (9 - i) * stepY; 

        ctx.fillStyle = colors[i];
        ctx.fillRect(w * 0.04, blockY, sideWidth, stepY);
        ctx.fillRect(w * 0.835, blockY, sideWidth, stepY);

        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, w * 0.032)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.fillText(i + 1, w * 0.102, blockY + stepY / 2);
        ctx.fillText(i + 1, w * 0.898, blockY + stepY / 2);

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(w * 0.04, blockY); ctx.lineTo(w * 0.04 + sideWidth, blockY);
        ctx.moveTo(w * 0.835, blockY); ctx.lineTo(w * 0.835 + sideWidth, blockY);
        ctx.stroke();
      }

      const bottomTrayY = h * 0.885;
      const bottomTrayH = h * 0.055;
      const bottomStartX = w * 0.14;
      const bottomEndX = w * 0.86;
      const bottomW = bottomEndX - bottomStartX;
      const bottomStepX = bottomW / 10;

      for (let i = 0; i < 10; i++) {
        const blockX = bottomStartX + i * bottomStepX;
        ctx.fillStyle = colors[i];
        ctx.fillRect(blockX, bottomTrayY, bottomStepX, bottomTrayH);

        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, w * 0.032)}px sans-serif`;
        ctx.fillText(i + 1, blockX + bottomStepX / 2, bottomTrayY + bottomTrayH / 2);

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.strokeRect(blockX, bottomTrayY, bottomStepX, bottomTrayH);
      }

      ctx.strokeStyle = '#b45309'; 
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';

      // 左筒壁
      ctx.beginPath();
      ctx.moveTo(w * 0.165, h * 0.38); ctx.lineTo(w * 0.165, stopper.y); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w * 0.28, h * 0.38); ctx.lineTo(w * 0.28, stopper.y); ctx.stroke();

      // 右筒壁
      ctx.beginPath();
      ctx.moveTo(w * 0.835, h * 0.38); ctx.lineTo(w * 0.835, stopper.y); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w * 0.72, h * 0.38); ctx.lineTo(w * 0.72, stopper.y); ctx.stroke();

      // 三角屋根
      ctx.fillStyle = '#dbb280';
      ctx.beginPath();
      ctx.moveTo(w * 0.5, h * 0.31);
      ctx.lineTo(w * 0.28, h * 0.37);
      ctx.lineTo(w * 0.72, h * 0.37);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      pins.forEach(pin => {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(pin.x + 1, pin.y + 2, pin.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#d97706'; 
        ctx.beginPath();
        ctx.arc(pin.x, pin.y, pin.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fef3c7';
        ctx.beginPath();
        ctx.arc(pin.x - pin.r*0.3, pin.y - pin.r*0.3, pin.r * 0.3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawStopper(w, h) {
      if (stopper.isOpen) {
        stopper.targetX = w * 0.85; 
      } else {
        stopper.targetX = 0;
      }
      stopper.currentX += (stopper.targetX - stopper.currentX) * 0.15;

      ctx.save();
      ctx.fillStyle = '#ec4899'; 
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;

      const drawLeftX1 = w * 0.165 + stopper.currentX;
      const drawLeftX2 = w * 0.28 + stopper.currentX;
      const drawRightX1 = w * 0.72 + stopper.currentX;
      const drawRightX2 = w * 0.835 + stopper.currentX;

      if (drawLeftX1 < w) {
        ctx.fillRect(drawLeftX1, stopper.y - 4, drawLeftX2 - drawLeftX1, stopper.height);
        ctx.beginPath();
        ctx.arc(drawLeftX2 - 5, stopper.y + stopper.height / 2 - 4, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#db2777';
        ctx.fill();
      }

      if (drawRightX1 < w) {
        ctx.fillStyle = '#ec4899';
        ctx.fillRect(drawRightX1, stopper.y - 4, drawRightX2 - drawRightX1, stopper.height);
        ctx.beginPath();
        ctx.arc(drawRightX2 - 5, stopper.y + stopper.height / 2 - 4, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#db2777';
        ctx.fill();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= p.decay;

        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;

        if (p.type === 'star') {
          ctx.beginPath();
          p.angle += p.spin;
          for (let j = 0; j < 5; j++) {
            ctx.lineTo(
              p.x + Math.cos(p.angle + (j * Math.PI * 2 / 5)) * p.r,
              p.y + Math.sin(p.angle + (j * Math.PI * 2 / 5)) * p.r
            );
            ctx.lineTo(
              p.x + Math.cos(p.angle + ((j + 0.5) * Math.PI * 2 / 5)) * (p.r * 0.4),
              p.y + Math.sin(p.angle + ((j + 0.5) * Math.PI * 2 / 5)) * (p.r * 0.4)
            );
          }
          ctx.closePath();
          ctx.fill();
        } else if (p.type === 'smoke') {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          p.angle += p.spin;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillRect(-p.r, -p.r/2, p.r * 2, p.r);
        }
        ctx.restore();
      }
    }

    // 【最重要】最初のロードおよび起動監視
    function init() {
      // 親の高さがまだ未決定（0など）の場合はループで少し待ってリトライする
      const parent = canvas.parentElement;
      if (!parent || parent.clientWidth <= 10 || parent.clientHeight <= 10) {
        setTimeout(init, 10);
        return;
      }
      
      resizeCanvas();
      animate(); // 描画ループ開始
    }

    // 複数のライフサイクルイベントにバインド
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      init();
    } else {
      window.addEventListener('DOMContentLoaded', init);
      window.addEventListener('load', init);
    }
  </script>
