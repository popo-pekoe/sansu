<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>かずあそびボード - たしざんのがくしゅう</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for Cute Japanese typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    /* 木枠のテクスチャをCSSグラデーションで表現 */
    .wood-frame {
      background: linear-gradient(135deg, #d7a15c 0%, #c58b43 50%, #b0752d 100%);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.4), 0 10px 25px rgba(0,0,0,0.3);
    }
    .wood-board {
      background: #fdf5e6; /* 温かみのあるアイボリー */
      background-image: radial-gradient(rgba(180, 140, 90, 0.05) 1px, transparent 0),
                        radial-gradient(rgba(180, 140, 90, 0.05) 1px, transparent 0);
      background-size: 8px 8px;
      background-position: 0 0, 4px 4px;
    }
    /* 手書き風数字ボックス */
    .num-box-yellow {
      border: 4px solid #eab308;
      background-color: #fef08a;
    }
    .num-box-blue {
      border: 4px solid #3b82f6;
      background-color: #bfdbfe;
    }
    .num-box-green {
      border: 4px solid #22c55e;
      background-color: #bbf7d0;
    }
    .num-box-purple {
      border: 4px dashed #a855f7;
      background-color: #f3e8ff;
    }
    
    /* 入力待ちの時にピカピカ光るパルスアニメーション */
    @keyframes pulse-glowing-yellow {
      0%, 100% { box-shadow: 0 0 0 0px rgba(234, 179, 8, 0.8); }
      50% { box-shadow: 0 0 0 14px rgba(234, 179, 8, 0); }
    }
    @keyframes pulse-glowing-blue {
      0%, 100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.8); }
      50% { box-shadow: 0 0 0 14px rgba(59, 130, 246, 0); }
    }
    @keyframes pulse-glowing-purple {
      0%, 100% { box-shadow: 0 0 0 0px rgba(168, 85, 247, 0.9); }
      50% { box-shadow: 0 0 0 16px rgba(168, 85, 247, 0); }
    }
    .pulse-yellow {
      animation: pulse-glowing-yellow 1.5s infinite ease-in-out;
    }
    .pulse-blue {
      animation: pulse-glowing-blue 1.5s infinite ease-in-out;
    }
    .pulse-purple {
      animation: pulse-glowing-purple 1.5s infinite ease-in-out;
    }

    /* 煙や雲のゆらゆら */
    @keyframes float-cloud {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(10px); }
    }
    .float-cloud {
      animation: float-cloud 6s infinite ease-in-out;
    }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .bounce-slow {
      animation: bounce-slow 2s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col items-center justify-between p-2 md:p-4 overflow-x-hidden">

  <!-- メインヘッダー -->
  <header class="w-full max-w-md text-center py-1 flex justify-between items-center px-2">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🎈</span>
      <h1 class="text-xl md:text-2xl font-black text-amber-800 tracking-wider">かずあそびボード</h1>
    </div>
    <button id="resetBtn" class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-3 py-1.5 rounded-full text-sm shadow-md transition-all active:scale-95 flex items-center gap-1">
      <span>🔄</span><span>さいしょから</span>
    </button>
  </header>

  <!-- ゲームメッセージ -->
  <div class="w-full max-w-md bg-white/90 border-2 border-amber-200 rounded-2xl p-2.5 shadow-sm text-center mb-1 relative">
    <p id="guideText" class="text-base md:text-lg font-bold text-amber-900 leading-tight">
      スタートボタンを おしてね！👇
    </p>
    <div id="handGuide" class="absolute right-4 -bottom-3 text-2xl pointer-events-none hidden transition-all duration-500">
      👆
    </div>
  </div>

  <!-- ゲームメインエリア -->
  <div class="w-full max-w-md aspect-[3/4] min-h-[420px] relative flex-grow flex items-center justify-center py-2">
    <!-- 外側の木枠 -->
    <div class="wood-frame w-full h-full rounded-3xl p-3 md:p-4 flex flex-col relative overflow-hidden">
      <!-- 内側のボード板 -->
      <div id="woodBoardContainer" class="wood-board w-full h-full rounded-2xl relative overflow-hidden flex flex-col border border-amber-900/10">
        
        <!-- 背景の空、気球、雲の描画(CSS) -->
        <div class="absolute inset-0 opacity-15 pointer-events-none overflow-hidden">
          <!-- 雲1 -->
          <div class="absolute top-10 left-10 float-cloud text-4xl">☁️</div>
          <!-- 雲2 -->
          <div class="absolute top-24 right-12 float-cloud text-5xl" style="animation-delay: 2s;">☁️</div>
          <!-- 気球 -->
          <div class="absolute top-4 right-1/4 bounce-slow text-4xl" style="animation-delay: 1s;">🎈</div>
          <div class="absolute top-16 left-1/4 bounce-slow text-3xl">🎈</div>
          <!-- ゾウとトラ -->
          <div class="absolute bottom-40 left-4 text-3xl opacity-30">🐯</div>
          <div class="absolute bottom-40 right-4 text-3xl opacity-30">🐘</div>
        </div>

        <!-- 物理アニメーション用キャンバス -->
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full z-10"></canvas>

        <!-- 盤面観察用の透明シールド（タップでもどるため。z-50に引き上げて確実に全体イベントを検知、bg-white/[0.01]でタッチ抜け防止） -->
        <div id="observeShield" onclick="restoreOverlayAfterObserving()" class="absolute inset-0 z-50 bg-white/[0.01] cursor-pointer hidden pointer-events-auto"></div>

        <!-- UI要素レイヤー -->
        <div class="absolute inset-0 z-20 pointer-events-none flex flex-col justify-between p-2">
          
          <!-- 上部：ビー玉投入セレクトエリア -->
          <div id="startScreen" class="pointer-events-auto absolute inset-0 bg-amber-900/40 backdrop-blur-[2px] rounded-2xl flex flex-col items-center justify-center p-4 z-30 transition-all duration-500">
            <div class="bg-white/95 rounded-2xl p-6 shadow-2xl border-4 border-amber-400 text-center max-w-[90%] transform scale-100 transition-transform">
              <p class="text-xl md:text-2xl font-black text-amber-900 mb-4">🔮 ビー玉を おとそう！</p>
              
              <button onclick="startRandomMarbles()" class="bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white font-black text-2xl px-12 py-4 rounded-2xl shadow-lg hover:shadow-xl active:scale-95 transition-all animate-bounce">
                スタート！ 🔮
              </button>
              
              <p class="text-xs text-amber-700 font-semibold mt-4">1〜10この ビー玉が ランダムに おちてくるよ！</p>
              <p class="text-[10px] text-amber-600/70 font-bold mt-2 tracking-wide">v1.06</p>
            </div>
          </div>

          <!-- 中央：数式ボード（家型のボード部分を再現） -->
          <div id="equationBoard" class="absolute left-1/2 -translate-x-1/2 top-[42%] -translate-y-1/2 w-[45%] aspect-[5/6] bg-[#fbf5eb] rounded-xl border-4 border-amber-700/80 shadow-md flex flex-col justify-between p-2 pointer-events-auto z-20">
            <!-- 家の屋根の装飾（CSSで表現） -->
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[45px] border-r-[45px] border-b-[16px] border-l-transparent border-r-transparent border-b-amber-800"></div>
            
            <!-- 上部：合計カード（?マーク） -->
            <div class="flex justify-center mt-2">
              <div id="boxTotal" onclick="openKeypad('total')" class="w-12 h-12 md:w-14 md:h-14 num-box-purple rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black text-purple-700 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valTotal">?</span>
                <div id="glowTotal" class="absolute inset-0 border-4 border-purple-500 rounded-xl opacity-0"></div>
              </div>
            </div>

            <!-- 分岐の線 (SVG) -->
            <div class="w-full flex justify-center -my-1 h-8">
              <svg class="w-full h-full" viewBox="0 0 100 40">
                <line x1="50" y1="5" x2="25" y2="35" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                <line x1="50" y1="5" x2="75" y2="35" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>

            <!-- 下部：左右のカード -->
            <div class="flex justify-between px-1 mb-2">
              <!-- 左 -->
              <div id="boxLeft" onclick="openKeypad('left')" class="w-11 h-11 md:w-12 md:h-12 num-box-yellow rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-amber-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valLeft">?</span>
                <div id="glowLeft" class="absolute inset-0 border-4 border-yellow-500 rounded-xl opacity-0"></div>
              </div>
              
              <!-- プラス記号 -->
              <div class="flex items-center justify-center font-bold text-amber-800 text-lg md:text-xl">+</div>

              <!-- 右 -->
              <div id="boxRight" onclick="openKeypad('right')" class="w-11 h-11 md:w-12 md:h-12 num-box-blue rounded-xl flex items-center justify-center text-xl md:text-2xl font-black text-blue-800 shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30">
                <span id="valRight">?</span>
                <div id="glowRight" class="absolute inset-0 border-4 border-blue-500 rounded-xl opacity-0"></div>
              </div>
            </div>
          </div>

          <!-- 仕切り板（ピンクのバー）のクリック・タップ検出領域 -->
          <div id="pinkStopper" class="pointer-events-auto touch-none absolute bottom-[14.5%] left-0 w-full h-[3.5%] cursor-pointer z-20 flex justify-center items-center">
            <!-- 仕切り引き抜きのガイド手アイコン -->
            <div id="stopperTouchGuide" class="hidden pointer-events-auto touch-none absolute right-[10%] -top-12 bg-rose-100 border-2 border-rose-400 text-rose-800 font-black rounded-lg px-2 py-1 text-xs shadow-md animate-bounce z-40">
              ここを タップ！ 👇
            </div>
            <!-- ピンク of バー本体 -->
            <div class="wood-stopper w-full h-full bg-pink-500/20 active:bg-pink-500/40 transition-colors"></div>
          </div>

        </div>

        <!-- 祝・クリア！の特大オーバーレイ (transitionアニメーションを安定化させるため、初期状態は opacity-0 pointer-events-none を付与) -->
        <div id="clearOverlay" class="absolute inset-0 z-40 bg-amber-900/60 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-700">
          <div class="bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-75 transition-transform duration-700" id="clearModal">
            <span class="text-6xl md:text-7xl block animate-bounce mb-3">🎉 💮 🎉</span>
            <h2 class="text-2xl md:text-3xl font-black text-green-600 mb-1">できた！すごーい！</h2>
            <p id="mathSummaryText" class="text-xl md:text-2xl font-bold text-amber-800 mb-4 bg-amber-50 py-2 rounded-xl">4 + 3 = 7</p>
            
            <!-- 「ばんめんをみる」ボタンと「もういちどあそぶ」ボタンのコンボ -->
            <div class="flex flex-col gap-2.5">
              <button onclick="hideOverlayToObserve()" class="bg-amber-100 hover:bg-amber-200 text-amber-900 border-2 border-amber-400 font-bold text-base py-2.5 px-6 rounded-full shadow transition-all active:scale-95 flex items-center justify-center gap-1.5 mx-auto pointer-events-auto">
                <span>🔍</span><span>ばんめんをみる</span>
              </button>
              
              <button onclick="resetGame()" class="bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-black text-lg md:text-xl px-8 py-3 rounded-full shadow-lg hover:shadow-xl active:scale-95 transition-all pointer-events-auto">
                もういちど あそぶ！ 🔄
              </button>
            </div>
          </div>
        </div>

        <!-- 盤面確認中の透かしガイダンスバー -->
        <div id="observeBanner" class="absolute top-2 left-1/2 -translate-x-1/2 bg-rose-500/90 border border-white text-white font-black text-xs md:text-sm px-4 py-2 rounded-full shadow-lg z-50 pointer-events-none opacity-0 transition-opacity duration-300 text-center">
          👇 画面のどこかを タップすると、ボタンが もどるよ！
        </div>

      </div>
    </div>
  </div>

  <!-- タブレット/スマホ用の数字キーパッド -->
  <div id="keypad" class="w-full max-w-md bg-amber-100 border-t-4 border-amber-300 p-3 rounded-t-3xl shadow-2xl transition-all duration-300 translate-y-full fixed bottom-0 left-1/2 -translate-x-1/2 z-[100]">
    <div class="flex justify-between items-center mb-2 px-1">
      <span id="keypadTitle" class="font-bold text-amber-900 text-base">すうじを えらぼう</span>
      <button onclick="closeKeypad()" class="text-amber-800 hover:text-amber-950 font-black text-sm bg-amber-200 hover:bg-amber-300 px-3 py-1 rounded-full">
        とじる ✖
      </button>
    </div>
    <!-- 0から10までの丸いテンキー -->
    <div class="grid grid-cols-6 gap-1.5 justify-items-center">
      <button onclick="pressKey(0)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">0</button>
      <button onclick="pressKey(1)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">1</button>
      <button onclick="pressKey(2)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">2</button>
      <button onclick="pressKey(3)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">3</button>
      <button onclick="pressKey(4)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">4</button>
      <button onclick="pressKey(5)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">5</button>
      <button onclick="pressKey(6)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">6</button>
      <button onclick="pressKey(7)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">7</button>
      <button onclick="pressKey(8)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">8</button>
      <button onclick="pressKey(9)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all">9</button>
      <button onclick="pressKey(10)" class="keypad-btn bg-white hover:bg-amber-50 text-amber-950 font-black text-lg w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-amber-400 shadow active:scale-90 transition-all col-span-2 w-full !rounded-xl">10</button>
    </div>
  </div>

  <!-- フッター -->
  <footer class="w-full max-w-md text-center py-2 text-xs text-amber-700/80 font-semibold">
    木のおもちゃを スマホやタブレットで再現しました
  </footer>

  <script>
    // --- グローバル変数・定数の定義 (起動時の参照エラーを防ぐためにトップに配置) ---
    const STATE = {
      SELECT: 'select',            // 球数選択
      DROP: 'drop',                // 上から落下
      INPUT_HALVES: 'input_halves',// 左右の数字入力待ち
      READY_RELEASE: 'ready_release', // ピンク仕切りタップ待ち
      RELEASING: 'releasing',      // 落ちていく
      INPUT_TOTAL: 'input_total',  // 合計入力待ち
      COMPLETE: 'complete'         // お祝い
    };

    let audioCtx = null;
    let currentState = STATE.SELECT;
    let targetTotalMarbles = 0; // ユーザーが指定した球数
    let marbles = [];
    let ghostMarbles = [];
    let pins = [];
    let particles = [];
    let activeKeypadTarget = null; // 'left', 'right', 'total'

    // 入力値
    let inputLeft = null;
    let inputRight = null;
    let inputTotal = null;
    let countingGuide = null;

    // おもちゃのレイアウト設定
    let leftCount = 0;
    let rightCount = 0;

    // 仕切り板（ピンクのバー）の状態
    let stopper = {
      x: 0,
      y: 0,
      width: 0,
      height: 10,
      targetX: 0,
      currentX: 0,
      isOpen: false
    };

    let isObservingMode = false;
    let lastSoundTime = 0; // 【新】バウンドSEの連続再生制限（デバウンス）用タイムスタンプ
    let stopperOpenTime = 0; // 【新】ピンクバーを外したときのタイムスタンプ

    // --- Web Audio API を使った木材の打撃音生成システム ---
    function playWoodSound(volume = 1) {
      try {
        // 【新】前回音が鳴ってから0.25秒（250ms）経っていない場合は再生をスキップ
        const now = Date.now();
        if (now - lastSoundTime < 250) {
          return;
        }
        lastSoundTime = now;

        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = 'triangle';
        const baseFreq = 260 + Math.random() * 60; 
        osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.06);
        
        gainNode.gain.setValueAtTime(volume * 0.12, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } catch (e) {
        console.log("Audio Error", e);
      }
    }

    // 【新：強制ウッド音】デバウンス制限を無視して、落下・整列のタイミングなどで強制的に音を出すシステム
    function playWoodSoundForced(volume = 1) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        const baseFreq = 220 + Math.random() * 40; 
        osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 0.05);
        
        gainNode.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.09);
      } catch (e) {}
    }

    function playSplashSound(volume = 1) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(620 + Math.random() * 80, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.16);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1400, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.16);

        gainNode.gain.setValueAtTime(volume * 0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);

        osc.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } catch (e) {}
    }

    function hexToRgb(hex) {
      const value = hex.replace('#', '');
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function parseColor(color) {
      if (color.startsWith('rgb')) {
        const values = color.match(/\d+/g).map(Number);
        return { r: values[0], g: values[1], b: values[2] };
      }

      return hexToRgb(color);
    }

    function mixColor(from, to, amount) {
      const start = parseColor(from);
      const end = parseColor(to);
      const t = Math.max(0, Math.min(1, amount));
      const r = Math.round(start.r + (end.r - start.r) * t);
      const g = Math.round(start.g + (end.g - start.g) * t);
      const b = Math.round(start.b + (end.b - start.b) * t);
      return `rgb(${r}, ${g}, ${b})`;
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 画面アスペクト比固定 (3:4)
    function resizeCanvas() {
      const parent = canvas.parentElement;
      if (parent) {
        canvas.width = parent.clientWidth;
        canvas.height = parent.clientHeight;
        initBoardLayout(); 
      }
    }

    // --- パーティクルエフェクト ---
    function createParticle(x, y, color, type = 'star') {
      const pCount = type === 'smoke' ? 3 : 10;
      for (let i = 0; i < pCount; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * (type === 'smoke' ? 2 : 6),
          vy: (Math.random() - 0.5) * (type === 'smoke' ? 2 : 6) - (type === 'smoke' ? 1 : 2),
          r: Math.random() * (type === 'smoke' ? 8 : 4) + 2,
          color: color,
          alpha: 1,
          decay: Math.random() * 0.02 + 0.015,
          type: type,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.1
        });
      }
    }

    function createSplashParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 5,
          vy: -Math.random() * 4 - 1,
          r: Math.random() * 3 + 1.5,
          color: color,
          alpha: 0.9,
          decay: Math.random() * 0.025 + 0.025,
          type: 'smoke',
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.1
        });
      }
    }

    function refreshBottomAlignment() {
      const ordered = [
        ...marbles.filter(m => m.status === 'aligned_bottom' && m.group === 'left'),
        ...marbles.filter(m => m.status === 'aligned_bottom' && m.group === 'right'),
        ...marbles.filter(m => m.status === 'aligned_bottom' && !m.group)
      ];

      ordered.forEach((marble, index) => {
        marble.alignedIndex = index;
      });
    }

    function captureGhostMarbles(stackMarbles) {
      ghostMarbles = stackMarbles.map(marble => ({
        x: marble.x,
        y: marble.y,
        r: marble.r * 0.92,
        color: marble.targetColor,
        group: marble.group
      }));
    }

    function drawGhostMarbles() {
      ghostMarbles.forEach(ghost => {
        ctx.save();
        ctx.globalAlpha = 0.26;

        const grad = ctx.createRadialGradient(
          ghost.x - ghost.r * 0.3, ghost.y - ghost.r * 0.3, ghost.r * 0.1,
          ghost.x, ghost.y, ghost.r
        );
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.45, ghost.color);
        grad.addColorStop(1, mixColor(ghost.color, '#111827', 0.18));

        ctx.beginPath();
        ctx.arc(ghost.x, ghost.y, ghost.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = ghost.group === 'left' ? '#fef08a' : '#bfdbfe';
        ctx.lineWidth = Math.max(1.5, ghost.r * 0.18);
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.restore();
      });
    }

    function getCountingMarbles(side) {
      const status = side === 'left' ? 'stack_left' : 'stack_right';
      return marbles
        .filter(marble => marble.status === status)
        .sort((a, b) => b.y - a.y);
    }

    function startCountingGuide(side) {
      if (currentState !== STATE.INPUT_HALVES) return;

      const countingMarbles = getCountingMarbles(side);
      if (countingMarbles.length === 0) return;

      countingGuide = {
        side,
        marbles: countingMarbles,
        startedAt: performance.now(),
        interval: 450
      };
      playWoodSoundForced(0.25);
    }

    function stopCountingGuide() {
      countingGuide = null;
    }

    function getCountingGuideStep() {
      if (!countingGuide) return null;

      const elapsed = performance.now() - countingGuide.startedAt;
      const index = Math.floor(elapsed / countingGuide.interval);

      if (index >= countingGuide.marbles.length) {
        return null;
      }

      return {
        side: countingGuide.side,
        index,
        number: index + 1,
        marble: countingGuide.marbles[index]
      };
    }

    function handleCanvasTap(event) {
      if (currentState !== STATE.INPUT_HALVES) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const tapX = (event.clientX - rect.left) * scaleX;
      const tapY = (event.clientY - rect.top) * scaleY;

      const tappedMarble = marbles.find(marble => {
        if (marble.status !== 'stack_left' && marble.status !== 'stack_right') return false;

        const dx = tapX - marble.x;
        const dy = tapY - marble.y;
        return Math.sqrt(dx * dx + dy * dy) <= marble.r * 1.7;
      });

      if (!tappedMarble) return;

      event.preventDefault();
      event.stopPropagation();
      startCountingGuide(tappedMarble.status === 'stack_left' ? 'left' : 'right');
    }

    // ピンの配置の初期化
    function initBoardLayout() {
      pins = [];
      const w = canvas.width;
      const h = canvas.height;

      // ピンは屋根の上部に配置
      const rows = 4;
      const startY = h * 0.08;
      const endY = h * 0.26;
      const stepY = (endY - startY) / (rows - 1);

      for (let r = 0; r < rows; r++) {
        const pinY = startY + r * stepY;
        const cols = r % 2 === 0 ? 6 : 7;
        const stepX = w / (cols + 1);
        for (let c = 0; c < cols; c++) {
          const pinX = stepX * (c + 1);
          if (r === 0 && (c === 2 || c === 3)) continue;
          pins.push({ x: pinX, y: pinY, r: 6 });
        }
      }

      // 左右の部屋の物理仕切り
      stopper.width = w;
      stopper.y = h * 0.85; 
      stopper.height = h * 0.02;
      stopper.currentX = 0;
      stopper.targetX = 0;
      stopper.isOpen = false;
    }

    // ビー玉クラス
    class Marble {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = 0;
        this.r = canvas.height * 0.047 * 0.45; 
        this.group = null;
        this.startColor = '#ffffff';
        this.targetColor = '#ffffff';
        this.colorBlend = 1;
        this.color = '#ffffff'; 
        this.bounce = 0.45; 
        this.status = 'falling'; 
        this.alignedIndex = -1;
        this.hue = Math.random() * 360; 
        this.releaseDelay = -1; // 【新】仕切りバーが引かれた後の、各ビー玉ごとの時差落下開始ディレイ(ms)
        this.hasPlayedBottomSound = false; // 重複発音防止フラグ
      }

      settleIntoGroup(group) {
        if (this.group) return;

        this.group = group;
        this.startColor = this.color;
        this.targetColor = group === 'left' ? '#facc15' : '#60a5fa';
        this.colorBlend = 0;
        playSplashSound(0.85);
        createSplashParticles(this.x, this.y, this.targetColor);
      }

      update() {
        const w = canvas.width;
        const h = canvas.height;
        const gravity = 0.25;

        if (this.colorBlend < 1) {
          this.colorBlend = Math.min(1, this.colorBlend + 0.08);
          this.color = mixColor(this.startColor, this.targetColor, this.colorBlend);
        }

        if (this.status === 'falling') {
          this.vy += gravity;
          this.x += this.vx;
          this.y += this.vy;

          if (this.x - this.r < w * 0.04) {
            this.x = w * 0.04 + this.r;
            this.vx = -this.vx * this.bounce;
            playWoodSound(0.5); 
          }
          if (this.x + this.r > w * 0.96) {
            this.x = w * 0.96 - this.r;
            this.vx = -this.vx * this.bounce;
            playWoodSound(0.5); 
          }

          pins.forEach(pin => {
            const dx = this.x - pin.x;
            const dy = this.y - pin.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.r + pin.r) {
              const angle = Math.atan2(dy, dx);
              this.x = pin.x + (this.r + pin.r) * Math.cos(angle);
              this.y = pin.y + (this.r + pin.r) * Math.sin(angle);

              const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
              this.vx = Math.cos(angle) * speed * this.bounce + (Math.random() - 0.5) * 0.5;
              this.vy = Math.sin(angle) * speed * this.bounce;
              
              playWoodSound(0.8); 
            }
          });

          const roofPeakX = w * 0.5;
          const roofPeakY = h * 0.31;
          const roofLeftEndX = w * 0.28;
          const roofLeftEndY = h * 0.37;
          const roofRightEndX = w * 0.72;
          const roofRightEndY = h * 0.37;

          if (this.x >= roofLeftEndX && this.x <= roofPeakX) {
            const ratio = (this.x - roofLeftEndX) / (roofPeakX - roofLeftEndX);
            const lineY = roofLeftEndY + ratio * (roofPeakY - roofLeftEndY);
            if (this.y + this.r >= lineY) {
              this.status = 'slide_left';
              this.vx = -2.5; 
              this.vy = 1;
              playWoodSound(0.4); 
            }
          }
          else if (this.x > roofPeakX && this.x <= roofRightEndX) {
            const ratio = (this.x - roofPeakX) / (roofRightEndX - roofPeakX);
            const lineY = roofPeakY + ratio * (roofRightEndY - roofPeakY);
            if (this.y + this.r >= lineY) {
              this.status = 'slide_right';
              this.vx = 2.5; 
              this.vy = 1;
              playWoodSound(0.4); 
            }
          }

          if (this.y > h * 0.37) {
            if (this.x < w * 0.28) {
              this.status = 'stack_left';
            } else if (this.x > w * 0.72) {
              this.status = 'stack_right';
            } else {
              if (this.x < w * 0.5) {
                this.x = w * 0.25;
                this.status = 'stack_left';
              } else {
                this.x = w * 0.75;
                this.status = 'stack_right';
              }
            }
          }
        }

        else if (this.status === 'slide_left') {
          this.x += this.vx;
          this.y += 0.8;
          if (this.x < w * 0.26) {
            this.status = 'stack_left';
          }
        }

        else if (this.status === 'slide_right') {
          this.x += this.vx;
          this.y += 0.8;
          if (this.x > w * 0.74) {
            this.status = 'stack_right';
          }
        }

        // 【新：時差落下トリガー】左右のスタック時に、仕切りバーがオープンかつディレイ時間が経過したかを個別に判定する
        else if (this.status === 'stack_left') {
          this.settleIntoGroup('left');
          const slotX = w * 0.22; 
          const index = marbles.filter(m => m.status === 'stack_left' && m.y > this.y).length;
          
          let targetY;
          const isReleased = stopper.isOpen && this.releaseDelay !== -1 && (Date.now() - stopperOpenTime >= this.releaseDelay);
          
          if (isReleased) {
            targetY = h * 1.1; 
          } else {
            const sideHeight = h * 0.47;
            const startY = h * 0.38;
            const stepY = sideHeight / 10;
            targetY = startY + (9.5 - index) * stepY;
          }

          this.x += (slotX - this.x) * 0.2;
          if (this.y < targetY) {
            this.vy += gravity;
            this.y += this.vy;
          } else {
            if (Math.abs(this.y - targetY) > 1 && this.vy > 0.5) {
              playWoodSound(0.3); 
            }
            this.y += (targetY - this.y) * 0.3;
            this.vy = 0;
            this.vx = 0;
          }

          if (isReleased) {
            this.status = 'dropping_bottom';
            playWoodSoundForced(0.5); // 【新】落下開始時にコトッと移動開始の小気味よいトリガー音を鳴らす
          }
        }

        // 【新：時差落下トリガー】右側
        else if (this.status === 'stack_right') {
          this.settleIntoGroup('right');
          const slotX = w * 0.78; 
          const index = marbles.filter(m => m.status === 'stack_right' && m.y > this.y).length;
          
          let targetY;
          const isReleased = stopper.isOpen && this.releaseDelay !== -1 && (Date.now() - stopperOpenTime >= this.releaseDelay);
          
          if (isReleased) {
            targetY = h * 1.1; 
          } else {
            const sideHeight = h * 0.47;
            const startY = h * 0.38;
            const stepY = sideHeight / 10;
            targetY = startY + (9.5 - index) * stepY;
          }

          this.x += (slotX - this.x) * 0.2;
          if (this.y < targetY) {
            this.vy += gravity;
            this.y += this.vy;
          } else {
            if (Math.abs(this.y - targetY) > 1 && this.vy > 0.5) {
              playWoodSound(0.3); 
            }
            this.y += (targetY - this.y) * 0.3;
            this.vy = 0;
            this.vx = 0;
          }

          if (isReleased) {
            this.status = 'dropping_bottom';
            playWoodSoundForced(0.5); // 【新】移動開始トリガー音
          }
        }

        else if (this.status === 'dropping_bottom') {
          this.vy += gravity;
          this.y += this.vy;
          this.x += this.vx;

          const bottomY = h * 0.94;
          if (this.y >= bottomY - this.r) {
            this.y = bottomY - this.r;
            this.vy = 0;
            this.status = 'aligned_bottom';
            refreshBottomAlignment();
            createSplashParticles(this.x, this.y, this.targetColor);
            
            // 【新】下部トレイに着地した瞬間、連続再生防止を無視してコトッと正確に音を鳴らす
            if (!this.hasPlayedBottomSound) {
              playWoodSoundForced(0.7); 
              this.hasPlayedBottomSound = true;
            }
          }
        }

        else if (this.status === 'aligned_bottom') {
          const trayStartX = w * 0.14;
          const trayEndX = w * 0.86;
          const trayWidth = trayEndX - trayStartX;
          const slotWidth = trayWidth / 10;

          if (this.alignedIndex !== -1) {
            const targetX = trayStartX + (this.alignedIndex * slotWidth) + (slotWidth / 2);
            this.x += (targetX - this.x) * 0.12;
            this.y = h * 0.93 - this.r; 
          }
        }
      }

      draw() {
        ctx.save();
        const grad = ctx.createRadialGradient(
          this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
          this.x, this.y, this.r
        );

        grad.addColorStop(0, '#ffffff'); 
        grad.addColorStop(0.3, mixColor('#ffffff', this.color, 0.35));
        grad.addColorStop(0.82, this.color);
        grad.addColorStop(1, mixColor(this.color, '#111827', 0.28));

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 3;
        
        ctx.fill();

        const countingStep = getCountingGuideStep();
        if (countingStep && countingStep.marble === this) {
          ctx.shadowColor = this.group === 'left' ? '#facc15' : '#60a5fa';
          ctx.shadowBlur = 18;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = Math.max(4, this.r * 0.28);
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r + 4, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // ゲームリセット
    function resetGame() {
      stopObservingBoard();

      marbles = [];
      ghostMarbles = [];
      particles = [];
      inputLeft = null;
      inputRight = null;
      inputTotal = null;
      stopCountingGuide();

      document.getElementById('valLeft').textContent = '?';
      document.getElementById('valRight').textContent = '?';
      document.getElementById('valTotal').textContent = '?';

      // ポップアップ消去
      const overlay = document.getElementById('clearOverlay');
      overlay.classList.add('opacity-0', 'pointer-events-none');
      overlay.classList.remove('opacity-100', 'pointer-events-auto');
      
      document.getElementById('clearModal').className = "bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-75 transition-transform duration-700";

      // スタート画面の復活
      const startScreen = document.getElementById('startScreen');
      startScreen.style.display = 'flex';
      startScreen.style.pointerEvents = '';
      setTimeout(() => {
        startScreen.classList.remove('opacity-0', 'pointer-events-none');
        startScreen.classList.add('pointer-events-auto');
      }, 50);
      
      initBoardLayout();
      currentState = STATE.SELECT;
      updateGuideMessage();
      updateGlowStyles();
    }
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    canvas.addEventListener('pointerdown', handleCanvasTap);

    // 1〜10個のビー玉をランダムに決定して開始する処理
    function startRandomMarbles() {
      if (currentState !== STATE.SELECT) return;
      playWoodSound(0.01);
      
      const randomCount = Math.floor(Math.random() * 10) + 1;
      selectMarbleCount(randomCount);
    }

    // ビー玉投入選択
    function selectMarbleCount(count) {
      if (currentState !== STATE.SELECT) return;
      targetTotalMarbles = count;
      currentState = STATE.DROP;
      
      // スタート画面をフェードアウトさせて物理的にも完全に非表示にする
      const startScreen = document.getElementById('startScreen');
      startScreen.style.pointerEvents = 'none';
      startScreen.classList.remove('pointer-events-auto');
      startScreen.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        if (currentState !== STATE.SELECT) {
          startScreen.style.display = 'none';
        }
      }, 500);

      updateGuideMessage();
      updateGlowStyles();

      // ビー玉を投入
      let dropped = 0;
      const interval = setInterval(() => {
        if (dropped >= targetTotalMarbles) {
          clearInterval(interval);
          return;
        }
        const dropX = canvas.width * 0.5 + (Math.random() - 0.5) * 15;
        const dropY = -20;
        marbles.push(new Marble(dropX, dropY));
        dropped++;
      }, 500);
    }

    // 入力枠のピカピカ光るアニメーションクラスの動的更新
    function updateGlowStyles() {
      const boxLeft = document.getElementById('boxLeft');
      const boxRight = document.getElementById('boxRight');
      const boxTotal = document.getElementById('boxTotal');

      if (currentState === STATE.INPUT_HALVES) {
        if (inputLeft === null) {
          boxLeft.classList.add('pulse-yellow');
        } else {
          boxLeft.classList.remove('pulse-yellow');
        }
        if (inputRight === null) {
          boxRight.classList.add('pulse-blue');
        } else {
          boxRight.classList.remove('pulse-blue');
        }
        boxTotal.classList.remove('pulse-purple');
      } else if (currentState === STATE.INPUT_TOTAL) {
        boxLeft.classList.remove('pulse-yellow');
        boxRight.classList.remove('pulse-blue');
        if (inputTotal === null) {
          boxTotal.classList.add('pulse-purple');
        } else {
          boxTotal.classList.remove('pulse-purple');
        }
      } else {
        boxLeft.classList.remove('pulse-yellow');
        boxRight.classList.remove('pulse-blue');
        boxTotal.classList.remove('pulse-purple');
      }
    }

    // ガイドメッセージの更新
    function updateGuideMessage() {
      const guide = document.getElementById('guideText');
      const hand = document.getElementById('handGuide');

      hand.classList.add('hidden');

      if (currentState === STATE.SELECT) {
        guide.innerHTML = "🔮 スタートボタンを おしてね！👇";
      } else if (currentState === STATE.DROP) {
        guide.innerHTML = "🍭 コロコロ... どっちに おちるかな？";
      } else if (currentState === STATE.INPUT_HALVES) {
        guide.innerHTML = "✏️ 左右の部屋の ビー玉は なんこ？<br><span class='text-amber-600 font-bold'>ピカピカ ひかっている ところ</span> を タップして すうじを いれてね！";
      } else if (currentState === STATE.READY_RELEASE) {
        guide.innerHTML = "🔔 ピンクの しきり板 を タップして はずしてみよう！";
        document.getElementById('stopperTouchGuide').classList.remove('hidden');
      } else if (currentState === STATE.RELEASING) {
        guide.innerHTML = "🌈 ひとつずつ ビー玉が 下に おちていくよ！";
        document.getElementById('stopperTouchGuide').classList.add('hidden');
      } else if (currentState === STATE.INPUT_TOTAL) {
        guide.innerHTML = "✏️ ぜんぶで なんこ になったかな？<br>いちばん <span class='text-purple-600 font-bold'>うえの ひかっている むらさきのしかく</span> を タップして ね！";
      } else if (currentState === STATE.COMPLETE) {
        guide.innerHTML = "🎉 おめでとう！ かんぺきだね！ ✨";
      }
    }

    // --- テンキー（キーパッド）操作 ---
    function openKeypad(target) {
      if (currentState === STATE.INPUT_HALVES && (target === 'left' || target === 'right')) {
        activeKeypadTarget = target;
        document.getElementById('keypadTitle').innerHTML = target === 'left' ? "🍋 ひだりの部屋 の ビー玉の数" : "🐳 みぎの部屋 の ビー玉の数";
        document.getElementById('keypad').classList.remove('translate-y-full');
        
        document.getElementById('glowLeft').classList.toggle('opacity-100', target === 'left');
        document.getElementById('glowRight').classList.toggle('opacity-100', target === 'right');
      } 
      else if (currentState === STATE.INPUT_TOTAL && target === 'total') {
        activeKeypadTarget = target;
        document.getElementById('keypadTitle').innerHTML = "🌟 ぜんぶ合わせた ビー玉の数";
        document.getElementById('keypad').classList.remove('translate-y-full');
        document.getElementById('glowTotal').classList.add('opacity-100');
      }
    }

    function closeKeypad() {
      document.getElementById('keypad').classList.add('translate-y-full');
      document.getElementById('glowLeft').classList.remove('opacity-100');
      document.getElementById('glowRight').classList.remove('opacity-100');
      document.getElementById('glowTotal').classList.remove('opacity-100');
      activeKeypadTarget = null;
    }

    function pressKey(num) {
      if (!activeKeypadTarget) return;

      if (activeKeypadTarget === 'left') {
        inputLeft = num;
        document.getElementById('valLeft').textContent = num;
        checkHalves();
      } else if (activeKeypadTarget === 'right') {
        inputRight = num;
        document.getElementById('valRight').textContent = num;
        checkHalves();
      } else if (activeKeypadTarget === 'total') {
        inputTotal = num;
        document.getElementById('valTotal').textContent = num;
        checkTotal();
      }

      closeKeypad();
      updateGlowStyles();
    }

    // 左右の入力が合っているかチェック
    function checkHalves() {
      const isLeftCorrect = inputLeft === leftCount;
      const isRightCorrect = inputRight === rightCount;

      const boxLeft = document.getElementById('boxLeft');
      const boxRight = document.getElementById('boxRight');

      const baseClassesLeft = 'w-11 h-11 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-xl md:text-2xl font-black shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';
      const baseClassesRight = 'w-11 h-11 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-xl md:text-2xl font-black shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';

      if (inputLeft !== null) {
        boxLeft.className = isLeftCorrect 
          ? `${baseClassesLeft} num-box-green text-green-700`
          : `${baseClassesLeft} num-box-yellow text-rose-600 border-rose-500 bg-rose-50`;
      }
      if (inputRight !== null) {
        boxRight.className = isRightCorrect 
          ? `${baseClassesRight} num-box-green text-green-700`
          : `${baseClassesRight} num-box-blue text-rose-600 border-rose-500 bg-rose-50`;
      }

      if (isLeftCorrect && isRightCorrect) {
        stopCountingGuide();
        currentState = STATE.READY_RELEASE;
        updateGuideMessage();
        createParticle(canvas.width * 0.25, canvas.height * 0.5, '#22c55e', 'star');
        createParticle(canvas.width * 0.75, canvas.height * 0.5, '#22c55e', 'star');
      }
    }

    // 合計の入力チェック
    function checkTotal() {
      const expectedTotal = leftCount + rightCount;
      const isCorrect = inputTotal === expectedTotal;

      const boxTotal = document.getElementById('boxTotal');
      const baseClassesTotal = 'w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center text-2xl md:text-3xl font-black shadow-inner cursor-pointer hover:scale-105 active:scale-95 transition-all relative pointer-events-auto z-30';

      if (isCorrect) {
        boxTotal.className = `${baseClassesTotal} num-box-green text-green-700`;
        currentState = STATE.COMPLETE;
        updateGuideMessage();
        
        document.getElementById('mathSummaryText').innerHTML = `<span class="text-yellow-500">${leftCount}</span> + <span class="text-blue-500">${rightCount}</span> = <span class="text-green-600 text-3xl font-black ml-1">${expectedTotal}</span>`;
        
        setTimeout(() => {
          // ダイアログを表示する際、確実に非表示用クラスを削除し、表示用クラスを追加
          const overlay = document.getElementById('clearOverlay');
          overlay.classList.remove('opacity-0', 'pointer-events-none');
          overlay.classList.add('opacity-100', 'pointer-events-auto');
          
          document.getElementById('clearModal').className = "bg-white rounded-3xl p-6 shadow-2xl border-8 border-green-400 text-center max-w-[85%] transform scale-100 transition-transform duration-700";
          
          for (let i = 0; i < 50; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: -20,
              vx: (Math.random() - 0.5) * 8,
              vy: Math.random() * 5 + 2,
              r: Math.random() * 6 + 4,
              color: `hsl(${Math.random() * 360}, 90%, 60%)`,
              alpha: 1,
              decay: 0.005,
              type: 'confetti',
              angle: Math.random() * Math.PI,
              spin: (Math.random() - 0.5) * 0.2
            });
          }
        }, 1000);
      } else {
        boxTotal.className = `${baseClassesTotal} num-box-purple text-rose-600 border-rose-500 bg-rose-50`;
      }
    }

    function hideOverlayToObserve() {
      playWoodSound(0.2);
      // ダイアログを100%確実に非表示にする
      const overlay = document.getElementById('clearOverlay');
      overlay.classList.add('opacity-0', 'pointer-events-none');
      overlay.classList.remove('opacity-100', 'pointer-events-auto');
      
      // 透明な観察シールドを有効化（z-50で一番手前に出し、タッチ抜けも完全ガード）
      const shield = document.getElementById('observeShield');
      shield.classList.remove('hidden');

      // ガイダンスバナーを表示
      const banner = document.getElementById('observeBanner');
      banner.style.opacity = "1";
    }

    function restoreOverlayAfterObserving() {
      playWoodSound(0.2);
      // バナーを隠す
      const banner = document.getElementById('observeBanner');
      banner.style.opacity = "0";

      // 観察シールドを隠す
      const shield = document.getElementById('observeShield');
      shield.classList.add('hidden');

      // お祝いダイアログを100%確実に再表示する
      const overlay = document.getElementById('clearOverlay');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      overlay.classList.add('opacity-100', 'pointer-events-auto');
    }

    function stopObservingBoard() {
      document.getElementById('observeBanner').style.opacity = "0";
      document.getElementById('observeShield').classList.add('hidden');
    }

    function releaseStopper(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      if (currentState === STATE.READY_RELEASE) {
        stopCountingGuide();
        stopper.isOpen = true;
        currentState = STATE.RELEASING;
        updateGuideMessage();
        updateGlowStyles();
        createParticle(canvas.width * 0.5, stopper.y, '#ec4899', 'smoke');
        playWoodSoundForced(1.0); // レバーが引かれるコトッという音

        stopperOpenTime = Date.now();

        // 【新：順次落下ロジック】
        // 左の黄色グループをすべて落としてから、右の青グループを落とす
        const leftStackMarbles = marbles
          .filter(m => m.status === 'stack_left')
          .sort((a, b) => b.y - a.y);
        const rightStackMarbles = marbles
          .filter(m => m.status === 'stack_right')
          .sort((a, b) => b.y - a.y);
        const stackMarbles = [...leftStackMarbles, ...rightStackMarbles];
        captureGhostMarbles(stackMarbles);

        // 各ビー玉に対して、400ms（0.4秒）ずつの時間差遅延を割り当てます
        stackMarbles.forEach((marble, idx) => {
          marble.releaseDelay = idx * 400; 
          marble.hasPlayedBottomSound = false; // 音声再生用フラグをクリア
        });

        // ビー玉の順次落下をすべて見届けるためのセーフティタイマー（球数 * 400ms + 着地までの余裕2秒に自動調節）
        const safetyTime = (stackMarbles.length * 400) + 2000;
        
        setTimeout(() => {
          if (currentState === STATE.RELEASING) {
            marbles.forEach((marble) => {
              marble.status = 'aligned_bottom';
            });
            refreshBottomAlignment();
            currentState = STATE.INPUT_TOTAL;
            updateGuideMessage();
            updateGlowStyles();
          }
        }, safetyTime);
      }
    }

    // 仕切り板タップ処理
    document.getElementById('pinkStopper').addEventListener('pointerdown', releaseStopper);
    document.getElementById('pinkStopper').addEventListener('click', releaseStopper);
    document.getElementById('stopperTouchGuide').addEventListener('pointerdown', releaseStopper);
    document.getElementById('stopperTouchGuide').addEventListener('click', releaseStopper);

    // --- メインループ ---
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width;
      const h = canvas.height;

      // 自己修復
      const parent = canvas.parentElement;
      if (parent && (canvas.width !== parent.clientWidth || canvas.height !== parent.clientHeight)) {
        if (parent.clientWidth > 10 && parent.clientHeight > 10) {
          canvas.width = parent.clientWidth;
          canvas.height = parent.clientHeight;
          initBoardLayout();
        }
      }

      drawBoardBackground(w, h);
      drawGhostMarbles();

      let allMarblesSettled = true;
      let tempLeftCount = 0;
      let tempRightCount = 0;

      marbles.forEach(marble => {
        marble.update();
        marble.draw();

        if (marble.status === 'falling' || marble.status === 'slide_left' || marble.status === 'slide_right') {
          allMarblesSettled = false;
        }
        if (marble.status === 'stack_left') {
          tempLeftCount++;
        }
        if (marble.status === 'stack_right') {
          tempRightCount++;
        }
        
        // 順次落下中もすべてのビー玉が底の整列状態になるまで完了を待つ
        if (marble.status === 'dropping_bottom' || (stopper.isOpen && marble.status.startsWith('stack'))) {
          allMarblesSettled = false;
        }
      });

      if (currentState === STATE.DROP && allMarblesSettled && marbles.length === targetTotalMarbles) {
        leftCount = tempLeftCount;
        rightCount = tempRightCount;
        currentState = STATE.INPUT_HALVES;
        updateGuideMessage();
        updateGlowStyles();
      }

      if (currentState === STATE.RELEASING) {
        const bottomCount = marbles.filter(m => m.status === 'aligned_bottom').length;
        if (bottomCount === targetTotalMarbles) {
          currentState = STATE.INPUT_TOTAL;
          updateGuideMessage();
          updateGlowStyles();
        }
      }

      drawStopper(w, h);
      drawParticles();

      requestAnimationFrame(animate);
    }

    function drawBoardBackground(w, h) {
      const sideWidth = w * 0.125;
      const sideHeight = h * 0.47;
      const startY = h * 0.38;

      const colors = [
        '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', 
        '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899'
      ];
      const countingStep = getCountingGuideStep();

      for (let i = 0; i < 10; i++) {
        const stepY = sideHeight / 10;
        const blockY = startY + (9 - i) * stepY; 

        ctx.fillStyle = colors[i];
        ctx.fillRect(w * 0.04, blockY, sideWidth, stepY);
        ctx.fillRect(w * 0.835, blockY, sideWidth, stepY);

        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, w * 0.032)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.fillText(i + 1, w * 0.102, blockY + stepY / 2);
        ctx.fillText(i + 1, w * 0.898, blockY + stepY / 2);

        if (countingStep && countingStep.number === i + 1) {
          const guideX = countingStep.side === 'left' ? w * 0.102 : w * 0.898;
          const guideY = blockY + stepY / 2;

          ctx.save();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 5;
          ctx.shadowColor = countingStep.side === 'left' ? '#facc15' : '#60a5fa';
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.arc(guideX, guideY, Math.max(13, w * 0.046), 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = '#ffffff';
          ctx.font = `bold ${Math.max(14, w * 0.04)}px sans-serif`;
          ctx.fillText(i + 1, guideX, guideY);
          ctx.restore();
        }

        // 【新：くっきり白丸の描画】対応した入力値の周りに手書き風の白丸＋黒フチ影を描画
        ctx.save();
        if (inputLeft !== null && inputLeft === (i + 1)) {
          ctx.strokeStyle = '#ffffff'; 
          ctx.lineWidth = 5;
          ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
          ctx.shadowBlur = 4;
          ctx.shadowOffsetX = 1;
          ctx.shadowOffsetY = 2;
          ctx.beginPath();
          ctx.arc(w * 0.102, blockY + stepY / 2, Math.max(12, w * 0.045), 0, Math.PI * 2);
          ctx.stroke();
        }
        if (inputRight !== null && inputRight === (i + 1)) {
          ctx.strokeStyle = '#ffffff'; 
          ctx.lineWidth = 5;
          ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
          ctx.shadowBlur = 4;
          ctx.shadowOffsetX = 1;
          ctx.shadowOffsetY = 2;
          ctx.beginPath();
          ctx.arc(w * 0.898, blockY + stepY / 2, Math.max(12, w * 0.045), 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(w * 0.04, blockY); ctx.lineTo(w * 0.04 + sideWidth, blockY);
        ctx.moveTo(w * 0.835, blockY); ctx.lineTo(w * 0.835 + sideWidth, blockY);
        ctx.stroke();
      }

      const bottomTrayY = h * 0.885;
      const bottomTrayH = h * 0.055;
      const bottomStartX = w * 0.14;
      const bottomEndX = w * 0.86;
      const bottomW = bottomEndX - bottomStartX;
      const bottomStepX = bottomW / 10;

      for (let i = 0; i < 10; i++) {
        const blockX = bottomStartX + i * bottomStepX;
        ctx.fillStyle = colors[i];
        ctx.fillRect(blockX, bottomTrayY, bottomStepX, bottomTrayH);

        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(12, w * 0.032)}px sans-serif`;
        ctx.fillText(i + 1, blockX + bottomStepX / 2, bottomTrayY + bottomTrayH / 2);

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.strokeRect(blockX, bottomTrayY, bottomStepX, bottomTrayH);
      }

      ctx.strokeStyle = '#b45309'; 
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';

      // 左筒壁
      ctx.beginPath();
      ctx.moveTo(w * 0.165, h * 0.38); ctx.lineTo(w * 0.165, stopper.y); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w * 0.28, h * 0.38); ctx.lineTo(w * 0.28, stopper.y); ctx.stroke();

      // 右筒壁
      ctx.beginPath();
      ctx.moveTo(w * 0.835, h * 0.38); ctx.lineTo(w * 0.835, stopper.y); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w * 0.72, h * 0.38); ctx.lineTo(w * 0.72, stopper.y); ctx.stroke();

      // 三角屋根
      ctx.fillStyle = '#dbb280';
      ctx.beginPath();
      ctx.moveTo(w * 0.5, h * 0.31);
      ctx.lineTo(w * 0.28, h * 0.37);
      ctx.lineTo(w * 0.72, h * 0.37);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      pins.forEach(pin => {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(pin.x + 1, pin.y + 2, pin.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#d97706'; 
        ctx.beginPath();
        ctx.arc(pin.x, pin.y, pin.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fef3c7';
        ctx.beginPath();
        ctx.arc(pin.x - pin.r*0.3, pin.y - pin.r*0.3, pin.r * 0.3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawStopper(w, h) {
      if (stopper.isOpen) {
        stopper.targetX = w * 0.85; 
      } else {
        stopper.targetX = 0;
      }
      stopper.currentX += (stopper.targetX - stopper.currentX) * 0.15;

      ctx.save();
      ctx.fillStyle = '#ec4899'; 
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;

      const drawLeftX1 = w * 0.165 + stopper.currentX;
      const drawLeftX2 = w * 0.28 + stopper.currentX;
      const drawRightX1 = w * 0.72 + stopper.currentX;
      const drawRightX2 = w * 0.835 + stopper.currentX;

      if (drawLeftX1 < w) {
        ctx.fillRect(drawLeftX1, stopper.y - 4, drawLeftX2 - drawLeftX1, stopper.height);
        ctx.beginPath();
        ctx.arc(drawLeftX2 - 5, stopper.y + stopper.height / 2 - 4, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#db2777';
        ctx.fill();
      }

      if (drawRightX1 < w) {
        ctx.fillStyle = '#ec4899';
        ctx.fillRect(drawRightX1, stopper.y - 4, drawRightX2 - drawRightX1, stopper.height);
        ctx.beginPath();
        ctx.arc(drawRightX2 - 5, stopper.y + stopper.height / 2 - 4, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#db2777';
        ctx.fill();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= p.decay;

        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;

        if (p.type === 'star') {
          ctx.beginPath();
          p.angle += p.spin;
          for (let j = 0; j < 5; j++) {
            ctx.lineTo(
              p.x + Math.cos(p.angle + (j * Math.PI * 2 / 5)) * p.r,
              p.y + Math.sin(p.angle + (j * Math.PI * 2 / 5)) * p.r
            );
            ctx.lineTo(
              p.x + Math.cos(p.angle + ((j + 0.5) * Math.PI * 2 / 5)) * (p.r * 0.4),
              p.y + Math.sin(p.angle + ((j + 0.5) * Math.PI * 2 / 5)) * (p.r * 0.4)
            );
          }
          ctx.closePath();
          ctx.fill();
        } else if (p.type === 'smoke') {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          p.angle += p.spin;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillRect(-p.r, -p.r/2, p.r * 2, p.r);
        }
        ctx.restore();
      }
    }

    // 最初の起動
    function init() {
      const parent = canvas.parentElement;
      if (!parent || parent.clientWidth <= 10 || parent.clientHeight <= 10) {
        setTimeout(init, 10);
        return;
      }
      
      resizeCanvas();
      animate(); 
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      init();
    } else {
      window.addEventListener('DOMContentLoaded', init);
      window.addEventListener('load', init);
    }
  </script>
</body>
